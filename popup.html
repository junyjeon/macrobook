<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 296px;
      margin: 0;
      padding: 14px;
      font-family: "Apple SD Gothic Neo", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafafa;
    }
    h1 {
      font-size: 13px;
      margin: 0 0 10px 0;
      color: #111;
      letter-spacing: 0.3px;
    }
    .status {
      font-size: 12px;
      color: #555;
      margin: 0 0 12px 0;
      padding: 8px 10px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .status .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9ca3af;
      margin-right: 6px;
      vertical-align: middle;
    }
    .status.recording .dot {
      background: #ef4444;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse { 50% { opacity: 0.3; } }
    .count { font-weight: 600; color: #111; }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 12px 4px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      color: #374151;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s, opacity 0.15s, transform 0.1s;
    }
    .action-btn:hover:not(:disabled) {
      background: #f9fafb;
      border-color: #d1d5db;
    }
    .action-btn:active:not(:disabled) {
      transform: scale(0.97);
      background: #f3f4f6;
    }
    .action-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .action-btn svg {
      width: 22px;
      height: 22px;
      display: block;
    }
    .action-btn.record { color: #ef4444; }
    .action-btn.stop   { color: #b91c1c; }
    .action-btn.clear  { color: #f59e0b; }
    .action-btn.copy   { color: #14b8a6; }

    .action-btn.copy.copied {
      background: #ccfbf1;
      border-color: #14b8a6;
      color: #0f766e;
    }

    .secondary-actions {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #f3f4f6;
    }
    .secondary {
      background: none;
      border: none;
      color: #6b7280;
      font-size: 11px;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: inherit;
    }
    .secondary:hover:not(:disabled) {
      color: #111;
      background: #f3f4f6;
    }
    .secondary:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <h1>Macro Recorder</h1>

  <div class="status" id="status">
    <span><span class="dot"></span><span id="state-label">대기 중</span></span>
    <span><span class="count" id="count">0</span> events</span>
  </div>

  <div class="actions">
    <button id="record-toggle" class="action-btn record" title="녹화 시작">
      <svg id="record-icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="7" fill="currentColor"/>
      </svg>
      <span id="record-label">녹화</span>
    </button>

    <button id="clear" class="action-btn clear" title="이벤트 초기화" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 6h18"/>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
        <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
      </svg>
      <span>초기화</span>
    </button>

    <button id="copy" class="action-btn copy" title="클립보드에 복사" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="9" y="9" width="11" height="11" rx="2"/>
        <path d="M5 15V5a2 2 0 0 1 2-2h10"/>
      </svg>
      <span id="copy-label">복사</span>
    </button>
  </div>

  <div class="secondary-actions">
    <button id="export" class="secondary" title="텍스트 파일로 다운로드" disabled>
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"
           style="width:11px;height:11px;">
        <path d="M7 2v8"/><path d="M3.5 7l3.5 3.5L10.5 7"/><path d="M2 12h10"/>
      </svg>
      출력
    </button>
    <button id="open-editor" class="secondary" title="새 탭에서 편집기 열기">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"
           style="width:11px;height:11px;">
        <path d="M10 1l3 3-8.5 8.5H1.5V9.5L10 1z"/>
      </svg>
      전체 편집
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
