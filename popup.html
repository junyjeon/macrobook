<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 296px;
      margin: 0;
      padding: 14px;
      font-family: "Apple SD Gothic Neo", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafafa;
    }
    h1 {
      font-size: 13px;
      margin: 0 0 10px 0;
      color: #111;
      letter-spacing: 0.3px;
    }
    .status {
      font-size: 12px;
      color: #555;
      margin: 0 0 12px 0;
      padding: 8px 10px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .status .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9ca3af;
      margin-right: 6px;
      vertical-align: middle;
    }
    .status.recording .dot {
      background: #ef4444;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse { 50% { opacity: 0.3; } }
    .count { font-weight: 600; color: #111; }

    .actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }
    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 10px 2px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      color: #374151;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s, opacity 0.15s, transform 0.1s;
    }
    .action-btn:hover:not(:disabled) {
      background: #f9fafb;
      border-color: #d1d5db;
    }
    .action-btn:active:not(:disabled) {
      transform: scale(0.97);
      background: #f3f4f6;
    }
    .action-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .action-btn svg {
      width: 20px;
      height: 20px;
      display: block;
    }
    .action-btn.record { color: #ef4444; }
    .action-btn.stop   { color: #374151; }
    .action-btn.copy   { color: #14b8a6; }
    .action-btn.export { color: #3b82f6; }

    .action-btn.copy.copied {
      background: #ccfbf1;
      border-color: #14b8a6;
      color: #0f766e;
    }

    .open-editor {
      width: 100%;
      margin-top: 6px;
      padding: 8px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: #fff;
      color: #374151;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
    }
    .open-editor:hover:not(:disabled) {
      background: #f3f4f6;
      border-color: #d1d5db;
    }
    .open-editor:disabled { opacity: 0.35; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>Macro Recorder</h1>

  <div class="status" id="status">
    <span><span class="dot"></span><span id="state-label">대기 중</span></span>
    <span><span class="count" id="count">0</span> events</span>
  </div>

  <div class="actions">
    <button id="record" class="action-btn record" title="녹화 시작">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="7" fill="currentColor"/>
      </svg>
      <span>녹화</span>
    </button>

    <button id="stop" class="action-btn stop" title="녹화 정지" disabled>
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/>
      </svg>
      <span>정지</span>
    </button>

    <button id="copy" class="action-btn copy" title="클립보드에 복사" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="9" y="9" width="11" height="11" rx="2"/>
        <path d="M5 15V5a2 2 0 0 1 2-2h10"/>
      </svg>
      <span id="copy-label">복사</span>
    </button>

    <button id="export" class="action-btn export" title="텍스트 파일로 출력" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 4v11"/>
        <path d="M7 10l5 5 5-5"/>
        <path d="M5 20h14"/>
      </svg>
      <span>출력</span>
    </button>
  </div>

  <button id="open-editor" class="open-editor" title="새 탭에서 편집기 열기">
    📝 전체 편집
  </button>

  <script src="popup.js"></script>
</body>
</html>
